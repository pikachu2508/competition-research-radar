name: 竞赛研究雷达

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 运行方式
        required: true
        default: test
        type: choice
        options:
          - test
          - daily
  schedule:
    # 免费定时任务可能排队数小时，因此提前多次轻量唤醒；只有北京时间 08:45—09:30 才会继续执行。
    - cron: '45 21 * * *'
    - cron: '15 22 * * *'
    - cron: '45 22 * * *'
    - cron: '15 23 * * *'
    - cron: '45 23 * * *'
    - cron: '15 0 * * *'
    - cron: '45 0 * * *'
    - cron: '15 1 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: competition-research-radar
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.window.outputs.should_run }}
    env:
      TZ: Asia/Shanghai
      PYTHONUTF8: '1'
      LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
      LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
      LARK_CHAT_ID: ${{ secrets.LARK_CHAT_ID }}
      RADAR_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'daily' }}
      RADAR_FORCE_TEST: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'test' && '1' || '0' }}
    steps:
      - name: 限定北京时间早间发送窗口
        id: window
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          now=$(TZ=Asia/Shanghai date +%H%M)
          if ((10#$now >= 845 && 10#$now <= 930)); then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "当前北京时间 $now，不在 08:45—09:30 发送窗口，跳过。"
          fi
      - uses: actions/checkout@v4
        if: steps.window.outputs.should_run == 'true'
      - uses: actions/setup-python@v5
        if: steps.window.outputs.should_run == 'true'
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
        if: steps.window.outputs.should_run == 'true'
      - name: 等待北京时间09:00
        if: steps.window.outputs.should_run == 'true' && (github.event_name == 'schedule' || inputs.mode == 'daily')
        run: python wait_until_morning.py
      - name: 抓取、生成页面并发送飞书
        if: steps.window.outputs.should_run == 'true'
        run: python cloud_run.py
      - name: 健康检查
        if: steps.window.outputs.should_run == 'true'
        run: |
          python - <<'PY'
          import sqlite3
          from pathlib import Path
          page = Path('output/index.html')
          assert page.exists() and page.stat().st_size > 50000, '雷达页面未正确生成'
          db = sqlite3.connect('data/radar.sqlite3')
          assert db.execute('select count(*) from entries').fetchone()[0] >= 100, '题录数量异常'
          assert db.execute("select count(*) from runs where failures='[]'").fetchone()[0] >= 1, '没有完整成功的抓取记录'
          PY
      - name: 保存雷达状态
        if: steps.window.outputs.should_run == 'true'
        run: |
          git config user.name 'competition-radar-bot'
          git config user.email 'competition-radar-bot@users.noreply.github.com'
          git add data/radar.sqlite3 output/index.html reports/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "更新竞赛研究雷达 $(date '+%Y-%m-%d %H:%M')"
            git push
          fi
      - uses: actions/configure-pages@v5
        if: steps.window.outputs.should_run == 'true'
      - uses: actions/upload-pages-artifact@v4
        if: steps.window.outputs.should_run == 'true'
        with:
          path: output

  deploy:
    needs: update
    if: needs.update.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 发布网页
        id: deployment
        uses: actions/deploy-pages@v4


